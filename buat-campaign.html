<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Campaign Baru - Kelompok 5</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d' } }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased overflow-x-hidden">

    <div class="flex h-screen overflow-hidden">
        
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-slate-200 hidden md:flex flex-col flex-shrink-0 z-10 shadow-sm">
            <div class="h-16 flex items-center px-6 border-b border-slate-200">
                <i class="ph-fill ph-hand-heart text-primary-600 text-3xl mr-2"></i>
                <span class="text-xl font-bold text-slate-800 tracking-tight">CrowdFund</span>
            </div>
            
            <div class="p-4 flex-1 overflow-y-auto">
                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-4 px-2">Menu Utama</p>
                <nav class="space-y-1">
                    <a href="dashboard.html" class="flex items-center px-3 py-2.5 text-slate-600 hover:bg-slate-50 rounded-lg font-medium transition-colors">
                        <i class="ph ph-squares-four text-xl mr-3"></i> Dashboard
                    </a>
                    <a href="buat-campaign.html" class="flex items-center px-3 py-2.5 bg-primary-50 text-primary-700 rounded-lg font-medium transition-colors">
                        <i class="ph ph-plus-circle text-xl mr-3"></i> Buat Campaign
                    </a>
                    <a href="campaign-saya.html" class="flex items-center px-3 py-2.5 text-slate-600 hover:bg-slate-50 rounded-lg font-medium transition-colors">
                        <i class="ph ph-megaphone text-xl mr-3"></i> Campaign Saya
                    </a>
                    <a href="riwayat-donasi.html" class="flex items-center px-3 py-2.5 text-slate-600 hover:bg-slate-50 rounded-lg font-medium transition-colors">
                        <i class="ph ph-wallet text-xl mr-3"></i> Riwayat Donasi
                    </a>
                </nav>

                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mt-8 mb-4 px-2">Pengaturan</p>
                <nav class="space-y-1">
                    <a href="pengaturan-sistem.html" class="flex items-center px-3 py-2.5 text-slate-600 hover:bg-slate-50 rounded-lg font-medium transition-colors">
                        <i class="ph ph-gear text-xl mr-3"></i> Pengaturan Sistem
                    </a>
                </nav>
            </div>
            
            <div class="p-4 border-t border-slate-200">
                <a href="pengaturan-sistem.html" class="flex items-center w-full p-2 hover:bg-slate-50 rounded-lg transition-colors group">
                    <div class="w-9 h-9 rounded-full bg-primary-100 flex items-center justify-center text-primary-700 font-bold text-sm mr-3">
                        <i class="ph-fill ph-user text-lg"></i>
                    </div>
                    <div class="flex-1 text-left">
                        <p class="text-sm font-semibold text-slate-900 group-hover:text-primary-600">Ahmad Rizki</p>
                        <p class="text-xs text-slate-500">Donatur Aktif</p>
                    </div>
                </a>
            </div>
        </aside>

        <div class="flex-1 flex flex-col h-screen overflow-hidden">
            <!-- Header -->
            <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 sm:px-6 lg:px-8 shadow-sm">
                <button class="md:hidden p-2 text-slate-500 hover:bg-slate-100 rounded-lg">
                    <i class="ph ph-list text-2xl"></i>
                </button>

                <div class="hidden sm:flex items-center bg-slate-100 rounded-lg px-3 py-2 w-96 transition-all focus-within:ring-2 focus-within:ring-primary-500 focus-within:bg-white">
                    <i class="ph ph-magnifying-glass text-slate-400 text-lg"></i>
                    <input type="text" placeholder="Cari campaign atau donatur..." class="bg-transparent border-none focus:outline-none ml-2 w-full text-sm text-slate-700 placeholder-slate-400">
                </div>

                <div class="flex items-center space-x-4">
                    <div class="relative">
                        <button id="notificationButtonCreate" class="relative p-2 text-slate-500 hover:bg-slate-100 rounded-full transition-colors">
                            <i class="ph ph-bell text-xl"></i>
                            <span class="absolute top-1.5 right-1.5 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
                        </button>
                    </div>
                    <div class="h-8 w-px bg-slate-200"></div>
                    <button class="flex items-center space-x-2 p-1 rounded-full hover:bg-slate-50 transition-colors">
                        <div class="w-8 h-8 rounded-full bg-primary-600 flex items-center justify-center text-white font-bold text-xs">AR</div>
                        <span class="text-sm font-medium text-slate-700 hidden sm:block">Ahmad Rizki</span>
                    </button>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 bg-slate-50/50">
                <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8">
                    <div class="mb-8 border-b border-slate-100 pb-5">
                        <h3 class="text-xl font-bold text-slate-900">Informasi Campaign</h3>
                        <p class="text-sm text-slate-500 mt-1">Lengkapi form di bawah ini untuk mempublikasikan galang dana Anda.</p>
                    </div>

                    <form action="campaign-saya.html" class="space-y-6">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Judul Campaign <span class="text-red-500">*</span></label>
                            <input type="text" required class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-primary-500 focus:border-primary-500 text-sm outline-none" placeholder="Cth: Bantu Biaya Sekolah Anak Yatim">
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Target Dana (Rp) <span class="text-red-500">*</span></label>
                                <input type="number" required class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-primary-500 outline-none" placeholder="10000000">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Batas Waktu (Deadline) <span class="text-red-500">*</span></label>
                                <input type="date" required class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-primary-500 outline-none text-slate-600">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Kategori <span class="text-red-500">*</span></label>
                            <select required class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-primary-500 outline-none text-slate-600 bg-white">
                                <option value="">Pilih Kategori...</option>
                                <option>Bantuan Medis</option>
                                <option>Pendidikan</option>
                                <option>Infrastruktur & Pembangunan</option>
                                <option>Sosial & Kemanusiaan</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Foto / Banner Campaign</label>
                            <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-slate-300 border-dashed rounded-xl hover:bg-slate-50 transition-colors cursor-pointer">
                                <div class="space-y-1 text-center">
                                    <i class="ph ph-image text-4xl text-slate-400"></i>
                                    <div class="flex text-sm text-slate-600 justify-center">
                                        <label class="relative cursor-pointer bg-white rounded-md font-medium text-primary-600 hover:text-primary-500">
                                            <span>Upload a file</span>
                                            <input type="file" class="sr-only">
                                        </label>
                                    </div>
                                    <p class="text-xs text-slate-500">PNG, JPG up to 5MB</p>
                                </div>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Cerita / Deskripsi Lengkap <span class="text-red-500">*</span></label>
                            <textarea rows="6" required class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-primary-500 outline-none text-sm" placeholder="Ceritakan secara detail mengapa Anda menggalang dana ini...">
