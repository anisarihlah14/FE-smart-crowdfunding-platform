<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - CrowdFund</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased min-h-screen flex flex-col py-10">

    <div class="absolute top-6 left-6">
        <a href="index.html" class="flex items-center space-x-2 text-slate-900 hover:opacity-80 transition-opacity">
            <i class="ph-fill ph-hand-heart text-primary-600 text-3xl"></i>
            <span class="text-xl font-bold tracking-tight hidden sm:block">CrowdFund</span>
        </a>
    </div>

    <div class="flex-1 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 p-8 sm:p-10">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-slate-900 mb-2">Buat Akun Baru</h1>
                <p class="text-sm text-slate-500">Bergabunglah untuk mulai menebar kebaikan.</p>
            </div>

            <form action="dashboard.html" method="GET" class="space-y-4">
                <div>
                    <label for="name" class="block text-sm font-medium text-slate-700 mb-1.5">Nama Lengkap</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="ph ph-user text-slate-400 text-lg"></i>
                        </div>
                        <input type="text" required class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:border-primary-500 sm:text-sm outline-none" placeholder="Cth: Ahmad Rizki">
                    </div>
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">Email Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="ph ph-envelope-simple text-slate-400 text-lg"></i>
                        </div>
                        <input type="email" required class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:border-primary-500 sm:text-sm outline-none" placeholder="nama@email.com">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="ph ph-lock-key text-slate-400 text-lg"></i>
                        </div>
                        <input type="password" required class="block w-full pl-10 pr-10 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:border-primary-500 sm:text-sm outline-none" placeholder="Buat password yang kuat">
                    </div>
                </div>

                <div class="flex items-start mt-2">
                    <div class="flex items-center h-5">
                        <input id="terms" type="checkbox" required class="h-4 w-4 text-primary-600 border-gray-300 rounded cursor-pointer">
                    </div>
                    <div class="ml-2 text-sm">
                        <label for="terms" class="font-medium text-slate-600 cursor-pointer">
                            Saya setuju dengan <a href="#" class="text-primary-600 hover:underline">Syarat & Ketentuan</a> serta <a href="#" class="text-primary-600 hover:underline">Kebijakan Privasi</a>.
                        </label>
                    </div>
                </div>

                <button type="submit" class="w-full py-3 px-4 mt-2 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-primary-600 hover:bg-primary-700 transition-colors">
                    Daftar Akun
                </button>
            </form>

            <div class="mt-6 relative">
                <div class="absolute inset-0 flex items-center" aria-hidden="true"><div class="w-full border-t border-slate-200"></div></div>
                <div class="relative flex justify-center text-sm"><span class="px-3 bg-white text-slate-500">Atau daftar dengan</span></div>
            </div>

            <div class="mt-6 flex gap-3">
                <a href="dashboard.html" class="w-full inline-flex justify-center py-2.5 px-4 border border-slate-300 rounded-xl shadow-sm bg-white text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="h-5 w-5 mr-2" alt="Google"> Google
                </a>
            </div>

            <p class="mt-8 text-center text-sm text-slate-600">
                Sudah punya akun? <a href="login.html" class="font-semibold text-primary-600 hover:text-primary-700">Masuk di sini</a>
            </p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
